version: '3.9'

services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-bot
    hostname: trading-bot
    
    # Environment
    environment:
      NODE_ENV: production
      CTRADER_HOST: ${CTRADER_HOST:-demo.ctraderapi.com}
      CTRADER_PORT: ${CTRADER_PORT:-5035}
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      REFRESH_TOKEN: ${REFRESH_TOKEN}
      ACCOUNT_ID: ${ACCOUNT_ID}
      PROXY_PORT: ${PROXY_PORT:-9009}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ALLOWED_USERS: ${ALLOWED_USERS:-}
      SIGNAL_FEED_ENABLED: ${SIGNAL_FEED_ENABLED:-false}
      SIGNAL_FEED_URL: ${SIGNAL_FEED_URL:-}
    
    # Volumes
    volumes:
      # Persist state files and logs
      - ./data:/app/data
      - ./src/state:/app/src/state
      # Keep node_modules in container (don't mount from host)
      # This prevents node_modules from being overwritten on Windows/Mac
    
    # Ports
    ports:
      # Map proxy port to host
      - "9009:9009"
    
    # Restart policy
    restart: unless-stopped
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    
    # Security
    security_opt:
      - no-new-privileges:true
    
    # Kill grace period (timeout before SIGKILL)
    # Gives bot time for graceful shutdown
    stop_grace_period: 30s

  # Optional: reverse proxy if you have a domain
  # (uncomment if needed for TradingView webhooks from external domain)
